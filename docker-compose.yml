version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: docs-mysql
    environment:
      MYSQL_DATABASE: docsdb
      MYSQL_USER: test
      MYSQL_PASSWORD: test
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: docs-app
    depends_on:
      - db
    environment:
      - JDBC_USER=test
      - JDBC_PASSWORD=test
      - JDBC_URL=jdbc:mysql://db:3306/docsdb?useSSL=false&serverTimezone=UTC
    ports:
      - "8080:8080"

volumes:
  db_data:
