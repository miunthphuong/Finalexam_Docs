spring.application.name=docs

# MySQL datasource (override with env vars: JDBC_URL, JDBC_USER, JDBC_PASSWORD)
spring.datasource.url=${JDBC_URL:jdbc:mysql://db:3306/docsdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${JDBC_USER:test}
spring.datasource.password=${JDBC_PASSWORD:test}
# Explicit driver for MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Ensure common MySQL8 params
# keep allowPublicKeyRetrieval for local/test convenience (remove in production)
spring.datasource.url=${JDBC_URL:jdbc:mysql://db:3306/docsdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useLegacyDatetimeCode=false}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.sql.init.mode=never
spring.sql.init.platform=mysql
server.port=8080
