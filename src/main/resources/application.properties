spring.application.name=docs

# MySQL datasource (override with env vars: JDBC_URL, JDBC_USER, JDBC_PASSWORD)
# Single canonical JDBC URL (default points to local docker-compose mapping)
spring.datasource.url=${JDBC_URL:jdbc:mysql://localhost:3307/docsdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useLegacyDatetimeCode=false}
spring.datasource.username=${JDBC_USER:test}
spring.datasource.password=${JDBC_PASSWORD:test}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / initialization
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Disable Spring SQL init (we seed via JPA seeder)
spring.sql.init.mode=never
spring.sql.init.platform=mysql

server.port=8080
