spring.application.name=docs

# MySQL datasource (override with env vars: JDBC_URL, JDBC_USER, JDBC_PASSWORD)
# Single JDBC URL entry. keep allowPublicKeyRetrieval for local/test convenience (remove in production).
spring.datasource.url=${JDBC_URL:jdbc:mysql://db:3306/docsdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useLegacyDatetimeCode=false}
spring.datasource.username=${JDBC_USER:test}
spring.datasource.password=${JDBC_PASSWORD:test}
# Explicit driver for MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / initialization
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Let Spring choose dialect or use a safe default
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# Provide Jakarta JDBC props so Hibernate can access JDBC metadata early
# Default to localhost:3307 for local runs (docker-compose maps host 3307 -> container 3306)
jakarta.persistence.jdbc.url=${JDBC_URL:jdbc:mysql://localhost:3307/docsdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useLegacyDatetimeCode=false}
jakarta.persistence.jdbc.user=${JDBC_USER:test}
jakarta.persistence.jdbc.password=${JDBC_PASSWORD:test}

# Disable Spring SQL init (we seed via JPA seeder)
spring.sql.init.mode=never
spring.sql.init.platform=mysql

server.port=8080
