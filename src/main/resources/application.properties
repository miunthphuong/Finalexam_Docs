spring.application.name=docs

# MySQL datasource (override with env vars: JDBC_URL, JDBC_USER, JDBC_PASSWORD)
spring.datasource.url=${JDBC_URL:jdbc:mysql://localhost:3306/docsdb?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${JDBC_USER:test}
spring.datasource.password=${JDBC_PASSWORD:test}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.sql.init.mode=always
spring.sql.init.platform=mysql
spring.jackson.serialization.write-dates-as-timestamps=false
server.port=8080
