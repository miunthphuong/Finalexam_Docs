<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Student Registration</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/app.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Docs University</a>
  </div>
</nav>
<div class="container">
  <div class="row">
    <div class="col-lg-8">
      <h3>Students</h3>
      <div id="students" class="list-group mb-4"></div>
    </div>
    <div class="col-lg-4">
      <h3>Register / Enroll</h3>
      <form id="regForm">
        <div class="mb-2">
          <label class="form-label">Student ID (leave blank to create)</label>
          <input id="studentId" type="number" step="1" min="1" class="form-control" />
        </div>
        <div class="mb-2">
          <label class="form-label">Matric Number</label>
          <input id="matricNumber" class="form-control" />
        </div>
        <div class="mb-2">
          <label class="form-label">First Name</label>
          <input id="firstName" class="form-control" />
        </div>
        <div class="mb-2">
          <label class="form-label">Last Name</label>
          <input id="lastName" class="form-control" />
        </div>
        <div class="mb-2">
          <label class="form-label">Date of Admission</label>
          <input id="dateOfAdmission" type="date" class="form-control" />
        </div>
        <div class="mb-2">
          <label class="form-label">Course</label>
          <select id="courseId" class="form-select"></select>
        </div>
        <div class="d-grid">
          <button class="btn btn-success" type="submit">Register / Enroll</button>
        </div>
      </form>
      <div id="msg" class="mt-3"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="/app.js"></script>
</body>
</html>
